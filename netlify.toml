[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Ces vars NEXT_PUBLIC_* sont intentionnellement dans le bundle client
  # VAPID_EMAIL et VAPID_PUBLIC_KEY ne sont pas des secrets (RFC 8292 : envoyes en clair dans les requetes push).
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_VAPID_PUBLIC_KEY,VAPID_PUBLIC_KEY,VAPID_EMAIL"

[build.cache]
  paths = [
    "node_modules/.cache",
    ".next/cache",
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"
